<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Poop Tracker</title>
    <!-- PWA -->
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#795548">
    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Poop Tracker">
    <link rel="apple-touch-icon" href="/static/icon-180.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #faf6f1;
            color: #3e2723;
            min-height: 100vh;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            padding-top: calc(env(safe-area-inset-top, 0px) + 20px);
            padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 20px);
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
            border-bottom: 2px solid #d7ccc8;
            margin-bottom: 24px;
        }
        header h1 { font-size: 24px; }
        .btn {
            display: inline-block;
            padding: 12px 24px;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            cursor: pointer;
            text-decoration: none;
            text-align: center;
            transition: transform 0.1s;
        }
        .btn:active { transform: scale(0.97); }
        .btn-primary { background: #795548; color: white; }
        .btn-secondary { background: #d7ccc8; color: #3e2723; }
        .btn-small { padding: 8px 16px; font-size: 14px; border-radius: 8px; }
        .btn-danger { background: #ef9a9a; color: #b71c1c; }
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #d7ccc8;
            border-radius: 8px;
            font-size: 16px;
            margin-bottom: 12px;
            background: white;
        }
        input:focus { outline: none; border-color: #795548; }
        .error {
            background: #ffcdd2;
            color: #b71c1c;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 16px;
        }
        a { color: #795548; }
    </style>
    {% block extra_style %}{% endblock %}
</head>
<body>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    <script>
        if ("serviceWorker" in navigator) {
            navigator.serviceWorker.register("/static/sw.js");
        }
    </script>
</body>
</html>
