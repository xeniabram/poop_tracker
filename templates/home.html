{% extends "base.html" %}
{% block extra_style %}
<style>
    .poop-hero {
        display: block;
        width: 140px;
        height: 140px;
        margin: 24px auto 0;
    }
    .actions {
        display: flex;
        flex-direction: column;
        gap: 16px;
        margin-top: 24px;
    }
    .poop-btn {
        background: #795548;
        color: white;
        padding: 32px;
        font-size: 28px;
        border-radius: 20px;
        border: none;
        cursor: pointer;
        transition: transform 0.1s, background 0.1s;
        width: 100%;
    }
    .poop-btn:hover { background: #5d4037; }
    .poop-btn:active { transform: scale(0.95); }
    .calendar-btn {
        display: block;
        background: #d7ccc8;
        color: #3e2723;
        padding: 20px;
        font-size: 22px;
        border-radius: 16px;
        border: none;
        cursor: pointer;
        text-decoration: none;
        text-align: center;
        transition: transform 0.1s;
    }
    .calendar-btn:hover { background: #bcaaa4; }
    .calendar-btn:active { transform: scale(0.95); }
    .success-flash {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: 80px;
        animation: pop 0.8s ease-out forwards;
        pointer-events: none;
        z-index: 100;
    }
    @keyframes pop {
        0% { opacity: 1; transform: translate(-50%, -50%) scale(0.5); }
        40% { transform: translate(-50%, -50%) scale(1.3); }
        100% { opacity: 0; transform: translate(-50%, -50%) scale(1.5) translateY(-40px); }
    }
</style>
{% endblock %}

{% block content %}
<header>
    <h1>Poop Tracker</h1>
    <form action="/logout" method="post" style="display:inline">
        <span style="margin-right: 8px; font-size: 14px; color: #8d6e63;">{{ user.username }}</span>
        <button type="submit" class="btn btn-small btn-danger">Выйти</button>
    </form>
</header>

<img src="/static/poop.svg" alt="poop" class="poop-hero">

<div class="actions">
    <form action="/poop" method="post">
        <button type="submit" class="poop-btn">Я покакал</button>
    </form>
    <a href="/calendar" class="calendar-btn">Календарь</a>
</div>

{% if just_pooped %}
<div class="success-flash">&#x1f4a9;</div>
{% endif %}
{% endblock %}
